<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0612;--bg2:#120e1f;--bg3:#1a1430;
  --pink:#ff2d87;--pink-soft:#ff6fb7;--coral:#ff6b5b;--peach:#ffaa7b;
  --teal:#00d4aa;--teal-soft:#7ee8d0;--pool:#00c2ff;
  --gold:#ffc857;--sunset:#ff8a5c;
  --wine:#c2185b;--purple:#a855f7;
  --text:#ffffff;--text-mid:#b8afd0;--text-dim:#6b6188;
  --glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.1);
  --glow-pink:0 0 20px rgba(255,45,135,.3),0 0 60px rgba(255,45,135,.1);
  --serif:'Playfair Display',Georgia,serif;--sans:'Outfit',-apple-system,sans-serif;
  --r:16px;--r-lg:24px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:calc(72px + var(--safe-b));-webkit-tap-highlight-color:transparent;position:relative}

/* ── Neon tropical background layers ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,45,135,.28), transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 20%, rgba(168,85,247,.28), transparent 65%),
    radial-gradient(ellipse 55% 35% at 15% 60%, rgba(0,212,170,.22), transparent 60%),
    radial-gradient(ellipse 55% 40% at 90% 70%, rgba(255,200,87,.2), transparent 60%),
    radial-gradient(ellipse 70% 30% at 50% 95%, rgba(255,107,91,.22), transparent 65%),
    linear-gradient(180deg,#14081f 0%,#1a0a2e 30%,#0f0620 60%,#1a0a2e 100%);
  background-size:200% 200%,200% 200%,220% 220%,200% 200%,200% 200%,100% 100%;
  animation:auroraMove 22s ease-in-out infinite;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,45,135,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,.05) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(180deg,transparent,black 20%,black 80%,transparent);
  -webkit-mask-image:linear-gradient(180deg,transparent,black 20%,black 80%,transparent);
  opacity:.55;
  animation:gridDrift 28s linear infinite;
}
body > *{position:relative;z-index:1}

::selection{background:rgba(255,45,135,.4);color:#fff}
::-webkit-scrollbar{width:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes textGlow{0%,100%{text-shadow:0 0 10px rgba(255,45,135,.4)}50%{text-shadow:0 0 25px rgba(255,45,135,.7),0 0 50px rgba(255,45,135,.3)}}
@keyframes neonPulse{0%,100%{border-color:rgba(255,45,135,.25)}50%{border-color:rgba(255,45,135,.6)}}
@keyframes slideText{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-8px)}}
@keyframes revealUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes auroraMove{
  0%,100%{background-position:0% 0%,100% 0%,0% 100%,100% 100%,50% 100%,0 0}
  50%{background-position:100% 50%,0% 50%,100% 0%,0% 0%,50% 50%,0 0}
}
@keyframes gridDrift{0%{background-position:0 0,0 0}100%{background-position:44px 44px,-44px 44px}}
@keyframes driftUp{
  0%{transform:translate3d(0,0,0) rotate(0deg);opacity:0}
  10%{opacity:.7}
  90%{opacity:.7}
  100%{transform:translate3d(var(--drift-x,0),-110vh,0) rotate(var(--drift-r,20deg));opacity:0}
}
@keyframes sunPulse{
  0%,100%{box-shadow:0 0 60px rgba(255,107,91,.55),0 0 120px rgba(255,45,135,.35),inset 0 -20px 40px rgba(255,200,87,.4)}
  50%{box-shadow:0 0 90px rgba(255,107,91,.8),0 0 180px rgba(255,45,135,.5),inset 0 -20px 40px rgba(255,200,87,.6)}
}
@keyframes titleGlow{
  0%,100%{filter:drop-shadow(0 0 18px rgba(255,45,135,.55)) drop-shadow(0 0 32px rgba(168,85,247,.35))}
  50%{filter:drop-shadow(0 0 30px rgba(255,45,135,.9)) drop-shadow(0 0 60px rgba(0,212,170,.5))}
}
@keyframes scanline{
  0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}
}

/* ── Scroll reveal ── */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── Floating tropical particles ── */
.tropics{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.tropic{position:absolute;bottom:-60px;font-size:clamp(1.4rem,4vw,1.8rem);filter:drop-shadow(0 0 14px rgba(255,45,135,.45));animation:driftUp linear infinite;opacity:.7;will-change:transform,opacity}

/* ── Neon scanline across hero ── */
.neon-scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,45,135,.8),rgba(0,212,170,.8),transparent);box-shadow:0 0 20px rgba(255,45,135,.6),0 0 40px rgba(0,212,170,.4);pointer-events:none;animation:scanline 6s ease-in-out infinite;z-index:2}

/* ── Card neon boost ── */
.card{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,6,18,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,45,135,.1);padding:4px 0 calc(4px + var(--safe-b));display:flex;justify-content:space-around;align-items:center}
.bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 14px;min-width:56px;min-height:48px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;justify-content:center}
.bnav-icon{font-size:clamp(1.2rem,4vw,1.4rem);transition:all .25s}
.bnav-label{font-size:clamp(.55rem,1.8vw,.62rem);font-weight:600;letter-spacing:.3px;color:var(--text-dim);transition:all .25s}
.bnav-btn.active .bnav-icon{transform:scale(1.2);filter:drop-shadow(0 0 10px rgba(255,45,135,.6))}
.bnav-btn.active .bnav-label{color:var(--pink)}

/* ── Sections ── */
.sec{max-width:640px;margin:0 auto;padding:clamp(28px,6vw,44px) clamp(16px,4vw,24px) clamp(36px,8vw,56px)}
.sec-hero{text-align:center;padding-top:clamp(36px,8vw,56px);padding-bottom:clamp(28px,6vw,44px)}
.tag{font-size:clamp(.58rem,1.6vw,.65rem);color:var(--pink);letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.sec-title{font-family:var(--serif);font-size:clamp(1.6rem,5.5vw,2rem);font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.15}
.sec-title i{background:linear-gradient(135deg,var(--pink),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sec-sub{color:var(--text-mid);font-size:clamp(.82rem,2.5vw,.9rem);margin-bottom:clamp(20px,5vw,28px);line-height:1.65}

/* ── Section color bands (amplified neon washes) ── */
.sec-band-1{background:linear-gradient(180deg,transparent,rgba(255,45,135,.1) 30%,rgba(255,107,91,.08) 70%,transparent);position:relative}
.sec-band-2{background:linear-gradient(180deg,transparent,rgba(0,212,170,.1) 30%,rgba(0,194,255,.08) 70%,transparent);position:relative}
.sec-band-3{background:linear-gradient(180deg,transparent,rgba(255,200,87,.1) 30%,rgba(255,138,92,.08) 70%,transparent);position:relative}
.sec-band-4{background:linear-gradient(180deg,transparent,rgba(168,85,247,.1) 30%,rgba(236,72,153,.08) 70%,transparent);position:relative}

/* ── Hero (neon sunset) ── */
.hero-bg{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(20,8,31,.4),rgba(26,10,46,.55) 50%,rgba(15,6,32,.65));background-size:100% 100%}
.hero-bg::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:30%;pointer-events:none;
  background:
    repeating-linear-gradient(180deg, transparent 0, transparent 6px, rgba(255,45,135,.05) 7px, rgba(255,45,135,.05) 8px),
    linear-gradient(180deg,transparent 0%,rgba(10,6,18,.25) 70%,rgba(10,6,18,.5) 100%);
  z-index:0;
}
.hero-bg > *{position:relative;z-index:1}
.hero-palm{font-size:clamp(2.4rem,7vw,3.2rem);animation:float 3.5s ease-in-out infinite;display:inline-block;margin-bottom:10px;filter:drop-shadow(0 0 16px rgba(255,200,87,.5))}
.hero-title{font-family:var(--serif);font-size:clamp(2.6rem,11vw,3.8rem);font-weight:700;line-height:1.05;margin-bottom:6px;animation:titleGlow 4s ease-in-out infinite}
.hero-title span{background:linear-gradient(135deg,var(--pink),var(--coral),var(--peach),var(--gold),var(--teal),var(--pink));background-size:400% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
.hero-tagline{font-size:clamp(.85rem,2.5vw,.95rem);color:var(--text-mid);margin-bottom:6px;font-weight:300;animation:fadeUp .8s ease .3s both}
.hero-loc{font-size:clamp(.65rem,2vw,.74rem);color:var(--gold);font-weight:600;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:clamp(28px,7vw,40px);animation:fadeUp .8s ease .5s both}

/* ── Countdown ── */
.cd-wrap{display:flex;justify-content:center;gap:clamp(8px,2.5vw,14px);flex-wrap:wrap;margin-bottom:clamp(24px,6vw,36px)}
.cd-box{background:var(--glass);border:1px solid rgba(255,45,135,.2);border-radius:var(--r);padding:clamp(10px,3vw,16px) clamp(12px,3.5vw,18px);min-width:clamp(62px,18vw,76px);text-align:center;animation:neonPulse 3s ease infinite}
.cd-num{font-family:var(--serif);font-size:clamp(1.6rem,5.5vw,2.2rem);font-weight:700;color:#fff;line-height:1;text-shadow:0 0 20px rgba(255,45,135,.4)}
.cd-label{font-size:clamp(.5rem,1.5vw,.6rem);color:var(--text-dim);letter-spacing:2px;margin-top:4px;text-transform:uppercase}
.villa-open{font-family:var(--serif);font-size:clamp(1.3rem,4.5vw,1.7rem);font-weight:700;color:var(--pink);animation:textGlow 2s ease infinite;margin-bottom:32px}

/* ── I've Got a Text ── */
.igt{background:linear-gradient(135deg,var(--pink),var(--wine));border-radius:var(--r);padding:clamp(14px,3.5vw,18px) clamp(16px,4vw,22px);margin-bottom:clamp(20px,5vw,28px);cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:var(--glow-pink);transition:all .25s;min-height:48px;text-align:left}
.igt:active{transform:scale(.98)}
.igt-icon{font-size:clamp(1.2rem,3.5vw,1.6rem);flex-shrink:0}
.igt-label{font-size:clamp(.55rem,1.6vw,.6rem);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:600}
.igt-text{font-size:clamp(.82rem,2.4vw,.9rem);font-weight:600;color:#fff;margin-top:2px;min-height:1.2em}
.igt-auto{display:flex;align-items:center;gap:6px;margin-top:4px}
.igt-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25)}
.igt-dot.active{background:#fff}

/* ── Preview Cards (auto-scroll marquee) ── */
.scroll-row-wrap{overflow:hidden;margin:0 calc(-1 * clamp(16px,4vw,24px));padding:0 0 8px;position:relative}
.scroll-row-wrap::before,.scroll-row-wrap::after{content:'';position:absolute;top:0;bottom:0;width:24px;z-index:2;pointer-events:none}
.scroll-row-wrap::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.scroll-row-wrap::after{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.scroll-row{display:flex;gap:clamp(10px,2.5vw,14px);animation:marquee 20s linear infinite;width:max-content}
.scroll-row:hover,.scroll-row:active{animation-play-state:paused}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.prev-card{min-width:clamp(180px,48vw,210px);max-width:clamp(180px,48vw,210px);border-radius:var(--r-lg);padding:clamp(16px,4vw,22px);flex-shrink:0;border:1px solid rgba(255,255,255,.08);text-align:left;transition:transform .3s,box-shadow .3s}
.prev-card:active{transform:scale(.97)}
.prev-card.c1{background:linear-gradient(135deg,rgba(255,45,135,.22),rgba(255,45,135,.06));border-color:rgba(255,45,135,.15)}
.prev-card.c2{background:linear-gradient(135deg,rgba(0,212,170,.22),rgba(0,212,170,.06));border-color:rgba(0,212,170,.15)}
.prev-card.c3{background:linear-gradient(135deg,rgba(255,200,87,.22),rgba(255,200,87,.06));border-color:rgba(255,200,87,.15)}
.prev-card.c4{background:linear-gradient(135deg,rgba(168,85,247,.22),rgba(168,85,247,.06));border-color:rgba(168,85,247,.15)}
.pc-emoji{font-size:clamp(1.3rem,3.5vw,1.6rem);margin-bottom:8px}
.pc-title{font-weight:700;font-size:clamp(.8rem,2.3vw,.9rem);color:#fff;margin-bottom:3px}
.pc-desc{font-size:clamp(.7rem,2vw,.78rem);color:var(--text-mid);line-height:1.45}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2.5vw,12px);margin-top:clamp(20px,5vw,28px)}
.stat{background:var(--glass);border-radius:var(--r);padding:clamp(12px,3.5vw,18px) 8px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.stat-num{font-family:var(--serif);font-size:clamp(1.2rem,4vw,1.6rem);font-weight:700;color:var(--pink)}
.stat-label{font-size:clamp(.52rem,1.5vw,.6rem);color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

/* ── Carousel ── */
.carousel{position:relative;overflow:hidden;margin:0 calc(-1 * clamp(16px,4vw,24px));padding:0 clamp(16px,4vw,24px);touch-action:pan-y}
.carousel-track{display:flex;transition:transform .4s cubic-bezier(.25,.8,.25,1);will-change:transform}
.carousel-slide{min-width:100%;display:flex;justify-content:center;padding:0 8px}
.isle-card{width:clamp(260px,75vw,300px);border-radius:var(--r-lg);overflow:hidden;border:2px solid rgba(255,45,135,.2);transition:all .3s}
.isle-top{padding:clamp(24px,6vw,36px) clamp(18px,5vw,28px) clamp(16px,4vw,22px);text-align:center}
.isle-emoji{font-size:clamp(2.6rem,8vw,3.4rem);margin-bottom:8px}
.isle-name{font-family:var(--serif);font-size:clamp(1.3rem,4.5vw,1.6rem);font-weight:700;color:#fff}
.isle-role{font-size:clamp(.6rem,1.8vw,.7rem);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:4px}
.isle-bottom{background:rgba(0,0,0,.3);padding:clamp(14px,3.5vw,18px) clamp(18px,5vw,28px) clamp(16px,4vw,22px);text-align:center}
.isle-tagline{font-size:clamp(.82rem,2.4vw,.9rem);font-style:italic;color:var(--text-mid);line-height:1.5;margin-bottom:6px}
.isle-detail{font-size:clamp(.68rem,2vw,.75rem);color:var(--text-dim)}
.isle-arrives{display:inline-block;font-size:clamp(.54rem,1.6vw,.6rem);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:4px 12px;border-radius:100px;margin-top:8px}

.carousel-nav{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:clamp(14px,4vw,22px)}
.carousel-arrow{background:var(--glass2);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;transition:all .2s}
.carousel-arrow:active{background:rgba(255,45,135,.3);transform:scale(.92)}
.carousel-dots{display:flex;gap:6px;align-items:center}
.carousel-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;cursor:pointer}
.carousel-dot.active{background:var(--pink);box-shadow:0 0 10px rgba(255,45,135,.5);width:10px;height:10px}

/* ── Itinerary ── */
.day-btn{width:100%;background:var(--glass);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:clamp(14px,3.5vw,18px) clamp(16px,4vw,22px);cursor:pointer;text-align:left;transition:all .25s;margin-bottom:8px;font-family:var(--sans);color:#fff;min-height:48px}
.day-btn.active{background:linear-gradient(135deg,rgba(255,45,135,.15),rgba(255,45,135,.05));border-color:rgba(255,45,135,.3);box-shadow:var(--glow-pink)}
.day-label{font-family:var(--serif);font-size:clamp(.95rem,3vw,1.1rem);font-weight:700}
.day-ep{font-size:clamp(.7rem,2vw,.78rem);margin-top:2px;color:var(--text-dim)}
.day-btn.active .day-ep{color:var(--pink-soft)}
.day-arrow{font-size:1.2rem;color:var(--text-dim);transition:transform .3s}
.day-btn.active .day-arrow{transform:rotate(90deg);color:var(--pink)}
.day-detail{background:var(--glass);border-radius:var(--r);padding:clamp(16px,4vw,22px);margin-bottom:14px;animation:fadeUp .35s ease;border:1px solid rgba(255,255,255,.04)}
.day-islanders{font-size:clamp(.6rem,1.8vw,.68rem);color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.day-vibe{font-size:clamp(.78rem,2.2vw,.85rem);color:var(--text-mid);font-style:italic;margin-bottom:16px;line-height:1.55}
.ev{display:flex;gap:clamp(10px,3vw,14px);padding:clamp(10px,3vw,14px) 0;align-items:flex-start}
.ev+.ev{border-top:1px solid rgba(255,255,255,.04)}
.ev-icon{font-size:clamp(1.2rem,3.5vw,1.5rem);flex-shrink:0}
.ev-time{font-size:clamp(.62rem,1.8vw,.68rem);color:var(--pink);font-weight:700;letter-spacing:.5px}
.ev-title{font-size:clamp(.86rem,2.5vw,.95rem);font-weight:700;color:#fff;margin-top:1px}
.ev-desc{font-size:clamp(.76rem,2.2vw,.83rem);color:var(--text-mid);margin-top:2px;line-height:1.5}
.ev-tip{font-size:clamp(.66rem,2vw,.72rem);color:var(--teal);font-weight:500;margin-top:4px}

/* ── Venues ── */
.vtab-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:18px;-webkit-overflow-scrolling:touch}
.vtab-row::-webkit-scrollbar{display:none}
.vtab{background:var(--glass);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:8px 16px;color:var(--text-dim);font-size:clamp(.65rem,2vw,.72rem);font-weight:600;cursor:pointer;transition:all .25s;font-family:var(--sans);white-space:nowrap;min-height:36px}
.vtab.active{background:var(--pink);color:#fff;border-color:var(--pink);box-shadow:0 0 12px rgba(255,45,135,.3)}
.venue{background:var(--glass);border-radius:var(--r);padding:clamp(14px,3.5vw,18px);border:1px solid rgba(255,255,255,.05);margin-bottom:10px}
.venue-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.venue-cat{font-size:clamp(.55rem,1.6vw,.6rem);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.venue-name{font-family:var(--serif);font-size:clamp(.92rem,2.8vw,1.05rem);font-weight:700;color:#fff}
.venue-desc{font-size:clamp(.76rem,2.2vw,.83rem);color:var(--text-mid);margin-top:4px;line-height:1.5}
.venue-vibe{display:flex;gap:2px;flex-shrink:0;font-size:clamp(.7rem,2vw,.8rem)}
.venue-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.vtag{font-size:clamp(.52rem,1.5vw,.58rem);padding:3px 10px;border-radius:100px;font-weight:600;letter-spacing:.3px;background:rgba(255,255,255,.06);color:var(--text-mid)}

/* ── Villa Rules ── */
.rules-list{display:flex;flex-direction:column;gap:clamp(8px,2.5vw,10px)}
.rule-item{display:flex;align-items:flex-start;gap:clamp(10px,3vw,14px);background:var(--glass);border:1px solid rgba(255,45,135,.08);border-radius:var(--r);padding:clamp(14px,3.5vw,16px) clamp(14px,3.5vw,18px)}
.rule-num-badge{min-width:clamp(28px,8vw,34px);height:clamp(28px,8vw,34px);border-radius:10px;background:linear-gradient(135deg,var(--pink),var(--wine));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:clamp(.75rem,2.2vw,.88rem);font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 0 12px rgba(255,45,135,.25)}
.rule-text{font-size:clamp(.82rem,2.4vw,.88rem);color:var(--text-mid);line-height:1.6;padding-top:3px}

/* ── Packing ── */
.pack-section{margin-bottom:clamp(18px,4.5vw,24px)}
.pack-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pack-emoji{font-size:clamp(1rem,3vw,1.2rem)}
.pack-title{font-weight:700;font-size:clamp(.82rem,2.4vw,.9rem);color:#fff;flex:1}
.pack-prog{font-size:clamp(.6rem,1.8vw,.68rem);color:var(--teal);font-weight:600}
.pack-bar{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:10px;overflow:hidden}
.pack-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--teal));border-radius:3px;transition:width .4s ease}
.checklist{display:flex;flex-direction:column;gap:5px}
.chk{display:flex;align-items:center;gap:10px;padding:clamp(10px,2.5vw,12px) clamp(12px,3vw,14px);background:var(--glass);border-radius:10px;border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .2s;font-size:clamp(.8rem,2.3vw,.88rem);color:var(--text-mid);min-height:44px}
.chk.checked{opacity:.35;text-decoration:line-through}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,45,135,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;transition:all .2s}
.chk.checked .chk-box{background:var(--pink);border-color:var(--pink);color:#fff}

/* ── Photo Ops ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2.5vw,12px)}
.photo-card{background:var(--glass);border-radius:var(--r);padding:clamp(12px,3.5vw,18px);border:1px solid rgba(255,255,255,.04);text-align:center}
.photo-emoji{font-size:clamp(1.3rem,3.5vw,1.6rem);margin-bottom:5px}
.photo-title{font-size:clamp(.76rem,2.2vw,.84rem);font-weight:700;color:#fff}
.photo-desc{font-size:clamp(.66rem,1.8vw,.72rem);color:var(--text-dim);margin-top:3px;line-height:1.4}

/* ── Logistics ── */
.log-item{background:var(--glass);border-radius:var(--r);padding:clamp(14px,3.5vw,18px);border:1px solid rgba(255,255,255,.04);margin-bottom:10px}
.log-label{font-size:clamp(.55rem,1.6vw,.6rem);letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:3px}
.log-value{font-size:clamp(.82rem,2.4vw,.9rem);color:#fff;font-weight:600}
.log-note{font-size:clamp(.74rem,2.2vw,.8rem);color:var(--text-mid);margin-top:3px;line-height:1.5}

/* ── Confessional FAB ── */
.fab{position:fixed;bottom:calc(72px + var(--safe-b) + 8px);right:16px;z-index:150;background:linear-gradient(135deg,var(--wine),var(--pink));width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 20px rgba(255,45,135,.4);cursor:pointer;transition:all .25s;border:none}
.fab:active{transform:scale(.88)}
.fab-panel{position:fixed;bottom:calc(130px + var(--safe-b));right:16px;left:16px;z-index:150;background:var(--bg2);border:1px solid rgba(255,45,135,.2);border-radius:var(--r-lg);padding:clamp(18px,5vw,24px);max-width:380px;margin-left:auto;box-shadow:0 8px 40px rgba(0,0,0,.6);animation:fadeUp .3s ease}
.fab-label{font-size:clamp(.55rem,1.6vw,.6rem);letter-spacing:3px;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:8px}
.fab-prompt{font-family:var(--serif);font-size:clamp(.95rem,3vw,1.08rem);font-style:italic;color:#fff;line-height:1.5;margin-bottom:12px}
.fab-next{background:var(--glass2);border:none;border-radius:100px;padding:10px 20px;color:var(--text-mid);font-size:clamp(.68rem,2vw,.75rem);font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s;min-height:40px}
.fab-next:active{background:rgba(255,45,135,.2);color:#fff}

/* ── Welcome / Card ── */
.welcome{background:var(--glass);border:1px solid rgba(255,255,255,.06);border-radius:var(--r-lg);padding:clamp(18px,5vw,24px);margin-top:clamp(20px,5vw,28px);text-align:left}
.welcome p{font-size:clamp(.82rem,2.4vw,.9rem);color:var(--text-mid);line-height:1.7}
.welcome strong{color:var(--pink-soft)}
.card{background:var(--glass);border-radius:var(--r-lg);padding:clamp(18px,5vw,24px);border:1px solid rgba(255,255,255,.05);margin-bottom:14px}
.card p,.card div{font-size:clamp(.78rem,2.3vw,.85rem)}

/* ── Weather ── */
.weather-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2.5vw,10px)}
.wx-day{background:var(--glass);border-radius:var(--r);padding:clamp(12px,3vw,16px) 8px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.wx-label{font-size:clamp(.58rem,1.6vw,.65rem);color:var(--text-dim);font-weight:600;letter-spacing:.5px;margin-bottom:4px}
.wx-icon{font-size:clamp(1.4rem,4vw,1.8rem);margin-bottom:4px}
.wx-temp{font-family:var(--serif);font-size:clamp(1.1rem,3.5vw,1.4rem);font-weight:700;color:#fff}
.wx-desc{font-size:clamp(.55rem,1.5vw,.62rem);color:var(--text-mid);margin-top:2px}
.wx-note{font-size:clamp(.7rem,2vw,.78rem);color:var(--text-mid);margin-top:16px;line-height:1.6;text-align:center}
.wx-loading{text-align:center;padding:24px;color:var(--text-dim);font-size:.82rem}

/* ── Music Player ── */
.music-bar{position:fixed;top:0;left:0;right:0;z-index:250;background:rgba(10,6,18,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,45,135,.1);transform:translateY(-100%);transition:transform .3s ease}
.music-bar.show{transform:translateY(0)}
.music-btn{background:linear-gradient(135deg,var(--pink),var(--wine));border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#fff;cursor:pointer;flex-shrink:0}
.music-btn:active{transform:scale(.9)}
.music-info{flex:1;min-width:0}
.music-title{font-size:clamp(.68rem,2vw,.75rem);font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-sub{font-size:clamp(.55rem,1.5vw,.6rem);color:var(--text-dim)}
.music-close{background:none;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;padding:8px}
.music-fab{position:fixed;top:12px;right:16px;z-index:140;background:var(--glass2);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .2s}
.music-fab:active{transform:scale(.9)}
.music-fab.playing{background:rgba(255,45,135,.2);border-color:rgba(255,45,135,.3);animation:neonPulse 2s ease infinite}

/* ── Confetti ── */
.confetti-wrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── Quiz ── */
.quiz-q{background:var(--glass);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:clamp(16px,4vw,22px);margin-bottom:10px}
.quiz-prompt{font-family:var(--serif);font-size:clamp(.9rem,2.8vw,1rem);font-weight:700;color:#fff;margin-bottom:12px}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{background:var(--glass2);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;cursor:pointer;font-size:clamp(.78rem,2.2vw,.85rem);color:var(--text-mid);transition:all .25s;min-height:44px;display:flex;align-items:center}
.quiz-opt:active{transform:scale(.98)}
.quiz-opt.correct{background:rgba(0,212,170,.15);border-color:var(--teal);color:var(--teal-soft)}
.quiz-opt.wrong{background:rgba(255,107,91,.1);border-color:var(--coral);color:var(--coral)}
.quiz-opt.selected{border-color:var(--pink);background:rgba(255,45,135,.1)}
.quiz-result{text-align:center;padding:20px;font-size:clamp(.8rem,2.3vw,.88rem);color:var(--text-mid);line-height:1.6}
.quiz-score{font-family:var(--serif);font-size:clamp(2rem,7vw,2.8rem);font-weight:700;color:var(--pink);margin-bottom:8px}

/* ── Now Playing (live tracker) ── */
.now-playing{background:linear-gradient(135deg,rgba(0,212,170,.12),rgba(0,212,170,.04));border:1px solid rgba(0,212,170,.2);border-radius:var(--r-lg);padding:clamp(16px,4vw,22px);margin-bottom:16px}
.np-label{font-size:clamp(.55rem,1.6vw,.6rem);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--teal);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.np-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.5s ease infinite}
.np-event{font-family:var(--serif);font-size:clamp(1rem,3vw,1.15rem);font-weight:700;color:#fff;margin-bottom:4px}
.np-desc{font-size:clamp(.76rem,2.2vw,.83rem);color:var(--text-mid)}
.np-next{font-size:clamp(.68rem,2vw,.75rem);color:var(--text-dim);margin-top:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Spotify ── */
.spotify-card{background:linear-gradient(135deg,rgba(30,215,96,.1),rgba(30,215,96,.03));border:1px solid rgba(30,215,96,.15);border-radius:var(--r-lg);padding:clamp(18px,4.5vw,24px);text-align:center}
.spotify-icon{font-size:2rem;margin-bottom:8px}
.spotify-title{font-size:clamp(.88rem,2.6vw,.95rem);font-weight:700;color:#fff;margin-bottom:4px}
.spotify-sub{font-size:clamp(.72rem,2vw,.8rem);color:var(--text-mid);margin-bottom:14px;line-height:1.5}
.spotify-btn{display:inline-flex;align-items:center;gap:6px;background:#1DB954;color:#fff;border:none;border-radius:100px;padding:10px 22px;font-size:clamp(.72rem,2vw,.8rem);font-weight:700;cursor:pointer;font-family:var(--sans);min-height:44px;transition:all .2s}
.spotify-btn:active{transform:scale(.95)}

/* ── Install Banner ── */
.install-banner{background:var(--glass);border:1px solid rgba(255,45,135,.1);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;cursor:pointer}
.install-banner:active{transform:scale(.98)}
.install-icon{font-size:1.3rem;flex-shrink:0}
.install-text{font-size:clamp(.76rem,2.2vw,.84rem);color:var(--text-mid);flex:1}
.install-text strong{color:#fff}
.install-dismiss{background:none;border:none;color:var(--text-dim);font-size:.9rem;cursor:pointer;padding:4px}

/* ── Quick Links ── */
.quick-links{display:flex;gap:clamp(8px,2.5vw,10px);justify-content:center;flex-wrap:wrap;margin-bottom:clamp(20px,5vw,28px)}
.ql-btn{display:flex;align-items:center;gap:6px;background:var(--glass2);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:10px 18px;font-size:clamp(.68rem,2vw,.76rem);color:#fff;font-weight:600;cursor:pointer;transition:all .25s;text-decoration:none;font-family:var(--sans);min-height:40px}
.ql-btn:active{transform:scale(.95);background:rgba(255,45,135,.15);border-color:rgba(255,45,135,.3)}

/* ── Couple of the Day ── */
.cotd{background:linear-gradient(135deg,rgba(255,45,135,.12),rgba(168,85,247,.08));border:1px solid rgba(255,45,135,.15);border-radius:var(--r-lg);padding:clamp(18px,4.5vw,24px);text-align:center;margin-bottom:clamp(16px,4vw,22px);position:relative;overflow:hidden}
.cotd::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(255,45,135,.05),transparent,rgba(168,85,247,.05),transparent);animation:cotdSpin 8s linear infinite}
@keyframes cotdSpin{to{transform:rotate(360deg)}}
.cotd-inner{position:relative;z-index:1}
.cotd-emoji{font-size:clamp(2rem,6vw,2.6rem);margin-bottom:6px}
.cotd-names{font-family:var(--serif);font-size:clamp(1.1rem,3.5vw,1.3rem);font-weight:700;color:#fff;margin-bottom:4px}
.cotd-blurb{font-size:clamp(.76rem,2.2vw,.84rem);color:var(--text-mid);font-style:italic;line-height:1.5}

/* ── Scotty Ticker ── */
.scotty-ticker{background:linear-gradient(135deg,rgba(255,200,87,.1),rgba(255,200,87,.04));border:1px solid rgba(255,200,87,.12);border-radius:var(--r);padding:clamp(12px,3vw,16px) clamp(14px,3.5vw,18px);display:flex;align-items:center;gap:10px;margin-bottom:clamp(16px,4vw,20px);overflow:hidden}
.scotty-avi{font-size:clamp(1.4rem,4vw,1.8rem);flex-shrink:0}
.scotty-msg{font-size:clamp(.76rem,2.2vw,.84rem);color:var(--text-mid);font-style:italic;line-height:1.45;flex:1;min-width:0}
.scotty-label{font-size:clamp(.52rem,1.5vw,.58rem);color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px}

/* ── Bombshell Alert ── */
.bombshell-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle,rgba(255,45,135,.3),transparent 70%);z-index:300;pointer-events:none;animation:bombFlash .8s ease forwards}
@keyframes bombFlash{0%{opacity:1}100%{opacity:0}}
.bombshell-badge{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,var(--coral),var(--pink));color:#fff;font-size:clamp(.48rem,1.4vw,.55rem);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:100px;animation:bombPulse 1.5s ease infinite}
@keyframes bombPulse{0%,100%{box-shadow:0 0 8px rgba(255,45,135,.4)}50%{box-shadow:0 0 20px rgba(255,45,135,.7)}}

/* ── Hydration Toast ── */
.hydrate-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:250;background:linear-gradient(135deg,rgba(0,212,170,.9),rgba(0,194,255,.9));color:#fff;padding:12px 24px;border-radius:100px;font-size:clamp(.76rem,2.2vw,.84rem);font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px rgba(0,212,170,.3);animation:toastIn .4s ease,toastOut .4s ease 3.6s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* ── Morning Recap ── */
.recap-card{background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(255,45,135,.08));border:1px solid rgba(168,85,247,.15);border-radius:var(--r-lg);padding:clamp(18px,4.5vw,24px);margin-bottom:clamp(16px,4vw,20px)}
.recap-label{font-size:clamp(.55rem,1.6vw,.6rem);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--purple);margin-bottom:8px}
.recap-title{font-family:var(--serif);font-size:clamp(1rem,3vw,1.15rem);font-weight:700;color:#fff;margin-bottom:8px}
.recap-items{display:flex;flex-direction:column;gap:4px}
.recap-item{font-size:clamp(.76rem,2.2vw,.83rem);color:var(--text-mid);padding-left:16px;position:relative;line-height:1.5}
.recap-item::before{content:'\2022';position:absolute;left:0;color:var(--purple)}

/* ── Venue Maps Button ── */
.venue-map{display:inline-flex;align-items:center;gap:4px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.15);border-radius:100px;padding:6px 14px;font-size:clamp(.6rem,1.8vw,.68rem);color:var(--teal);font-weight:600;cursor:pointer;margin-top:8px;text-decoration:none;transition:all .2s;font-family:var(--sans)}
.venue-map:active{transform:scale(.95);background:rgba(0,212,170,.2)}

/* ── Sparkle Animation ── */
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
.sparkle-wrap{position:absolute;pointer-events:none;z-index:0}
.sparkle{position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;animation:sparkle 2s ease infinite}

/* ── Floating Hearts ── */
@keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}

/* ── Entrance stagger ── */
.stagger-1{animation-delay:.1s}.stagger-2{animation-delay:.2s}.stagger-3{animation-delay:.3s}.stagger-4{animation-delay:.4s}

/* ── Glow hover for cards ── */
@keyframes cardGlow{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 20px rgba(255,45,135,.15)}}
.isle-card{animation:cardGlow 4s ease infinite}

/* ── Hero palm bounce ── */
@keyframes palmBounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(-5deg)}75%{transform:translateY(-6px) rotate(3deg)}}
.hero-palm:active{animation:palmBounce .5s ease}
.palm-wrap{position:relative;display:flex;flex-direction:column;align-items:center;width:100%;padding-top:42px;margin-bottom:6px}
.palm-wrap .hero-palm{margin-bottom:0}
.palm-bubble{position:absolute;top:0;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--pink),var(--coral));color:#fff;font-size:clamp(.58rem,1.7vw,.68rem);font-weight:800;letter-spacing:.5px;padding:7px 16px;border-radius:100px;white-space:nowrap;animation:bubbleBounce 1.5s ease infinite,fadeUp .5s ease .8s both;box-shadow:0 0 16px rgba(255,45,135,.4);pointer-events:none;text-transform:uppercase;z-index:2}
.palm-bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid var(--coral);filter:drop-shadow(0 2px 4px rgba(255,45,135,.3))}
@keyframes bubbleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── Neon text flicker ── */
@keyframes neonFlicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.7}94%{opacity:1}96%{opacity:.8}97%{opacity:1}}

/* ── Love Island Theme Button ── */
.li-theme-btn{display:block;width:100%;max-width:320px;margin:0 auto clamp(20px,5vw,28px);padding:clamp(16px,4vw,22px) clamp(24px,6vw,32px);background:linear-gradient(135deg,var(--pink),var(--wine),var(--coral));background-size:200% 200%;animation:gradMove 4s ease infinite;border:2px solid rgba(255,255,255,.15);border-radius:var(--r-lg);font-family:var(--sans);font-size:clamp(1rem,3vw,1.15rem);font-weight:800;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 30px rgba(255,45,135,.4),0 0 60px rgba(255,45,135,.15);transition:all .25s;text-align:center;position:relative;overflow:hidden}
.li-theme-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent 0%,rgba(255,255,255,.1) 25%,transparent 50%);animation:cotdSpin 3s linear infinite}
.li-theme-btn:active{transform:scale(.96);box-shadow:0 0 40px rgba(255,45,135,.6)}

function getCD(t){const d=t-new Date();if(d<=0)return{d:0,h:0,m:0,s:0,passed:!0};return{d:Math.floor(d/864e5),h:Math.floor(d/36e5%24),m:Math.floor(d/6e4%60),s:Math.floor(d/1e3%60),passed:!1}}

// Scroll reveal hook
function useReveal(){
  const ref=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add("visible");obs.unobserve(el)}},{threshold:.12});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return ref;
}
function Reveal({children,className=""}){
  const ref=useReveal();
  return h("div",{ref,className:"reveal "+className},children);
}

function Countdown(){
  const[t,sT]=useState(getCD(TRIP));
  useEffect(()=>{const i=setInterval(()=>sT(getCD(TRIP)),1000);return()=>clearInterval(i)},[]);

  return h("div",{className:"cd-wrap"},
    [{v:t.d,l:"Days"},{v:t.h,l:"Hours"},{v:t.m,l:"Mins"},{v:t.s,l:"Secs"}].map(u=>

    )
  );
}

function IslanderCarousel(){
  const[idx,sIdx]=useState(0);
  const[bombshellFlash,sBombshellFlash]=useState(false);
  const len=ISLANDERS.length;
  const goTo=function(newIdx){
    var isl=ISLANDERS[newIdx];
    if(isl&&isl.arrives==="Saturday"&&ISLANDERS[idx]&&ISLANDERS[idx].arrives!=="Saturday"){
      sBombshellFlash(true);
      setTimeout(function(){sBombshellFlash(false)},800);
    }
    sIdx(newIdx);
  };
  const prev=()=>goTo((idx-1+len)%len);
  const next=()=>goTo((idx+1)%len);
  // Momentum swipe
  const startX=useRef(0);const startT=useRef(0);
  const onTS=e=>{startX.current=e.touches[0].clientX;startT.current=Date.now()};
  const onTE=e=>{
    const dx=startX.current-e.changedTouches[0].clientX;
    const dt=Date.now()-startT.current;
    const vel=Math.abs(dx)/dt;
    if(Math.abs(dx)>50||vel>0.3){dx>0?next():prev()}
  };

  return h(Reveal,null,
    bombshellFlash&&h("div",{className:"bombshell-flash"}),
    h("div",{className:"carousel",onTouchStart:onTS,onTouchEnd:onTE},
      h("div",{className:"carousel-track",style:{transform:"translateX(-"+idx*100+"%)"}},
        ISLANDERS.map((isl,i)=>
          h("div",{className:"carousel-slide",key:isl.name},
            h("div",{className:"isle-card",style:{borderColor:isl.color+"44",boxShadow:"0 0 24px "+isl.color+"33, 0 0 60px "+isl.color+"11"}},
              isl.photo
                ? h("div",{className:"isle-top",style:{padding:0,position:"relative",height:"clamp(280px,70vw,340px)",backgroundImage:"url("+isl.photo+")",backgroundSize:"cover",backgroundPosition:"center top"}},
                    h("div",{style:{position:"absolute",left:0,right:0,bottom:0,padding:"clamp(16px,4vw,22px)",background:"linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.55) 50%, rgba(0,0,0,0) 100%)",textAlign:"center"}},
                      h("div",{style:{fontSize:"clamp(1.4rem,4.5vw,1.8rem)",marginBottom:"2px"}},isl.emoji),
                      h("div",{className:"isle-name"},isl.name),
                      h("div",{className:"isle-role",style:{color:"rgba(255,255,255,.75)"}},isl.role),
                    )
                  )
                : h("div",{className:"isle-top",style:{background:isl.bg}},
                    h("div",{className:"isle-emoji"},isl.emoji),
                    h("div",{className:"isle-name"},isl.name),
                    h("div",{className:"isle-role",style:{color:"rgba(255,255,255,.65)"}},isl.role),
                  ),
              h("div",{className:"isle-bottom"},
                h("div",{className:"isle-tagline"},"\u201C"+isl.tagline+"\u201D"),
                h("div",{className:"isle-detail"},isl.detail),
                isl.arrives==="Saturday"&&h("div",{className:"bombshell-badge"},"Bombshell"),
              h("div",{className:"isle-arrives",style:{
                  color:isl.arrives==="Saturday"?"var(--teal)":"var(--peach)",
                  background:isl.arrives==="Saturday"?"rgba(0,212,170,.12)":"rgba(255,170,123,.12)"}},
                  isl.arrives==="Saturday"?"Casa Amor — Saturday":"OG — Friday"),
              ),
            )
          )
        )
      )
    ),
    h("div",{className:"carousel-nav"},
      h("button",{className:"carousel-arrow",onClick:prev,"aria-label":"Previous"},"\u2039"),
      h("div",{className:"carousel-dots"},
        ISLANDERS.map((_,i)=>h("div",{key:i,className:"carousel-dot"+(i===idx?" active":""),onClick:()=>sIdx(i)}))
      ),
      h("button",{className:"carousel-arrow",onClick:next,"aria-label":"Next"},"\u203A"),
    ),
  );
}

function PackSection({title,emoji,items}){
  const[checked,sChecked]=useState({});
  const[copied,sCopied]=useState(false);
  const total=items.length;
  const done=Object.values(checked).filter(Boolean).length;
  const pct=total?Math.round(done/total*100):0;
  const toggle=function(item){sChecked(function(p){var n=Object.assign({},p);n[item]=!n[item];return n})};
  const copyList=function(){
    var unchecked=items.filter(function(item){return!checked[item]});
    var text=emoji+" "+title+":\n"+unchecked.map(function(i){return"\u25A1 "+i}).join("\n");
    navigator.clipboard.writeText(text).then(function(){sCopied(true);setTimeout(function(){sCopied(false)},2000)});
  };
  return h("div",{className:"pack-section"},
    h("div",{className:"pack-header"},
      h("span",{className:"pack-emoji"},emoji),
      h("div",{className:"pack-title"},title),
      h("div",{className:"pack-prog"},done+"/"+total),
    ),
    h("div",{className:"pack-bar"},h("div",{className:"pack-fill",style:{width:pct+"%"}})),
    h("div",{className:"checklist"},items.map(function(item){
      return h("div",{key:item,className:"chk"+(checked[item]?" checked":""),onClick:function(){toggle(item)}},
        h("div",{className:"chk-box"},checked[item]?"\u2713":""),
        item
      )
    })),
    h("button",{onClick:copyList,style:{background:"var(--glass2)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"100px",padding:"8px 16px",color:copied?"var(--teal)":"var(--text-dim)",fontSize:"clamp(.6rem,1.8vw,.68rem)",fontWeight:600,cursor:"pointer",marginTop:"8px",fontFamily:"var(--sans)",transition:"all .2s"}},copied?"\u2713 Copied!":"\uD83D\uDCCB Copy unchecked to Notes"),
  );
}

      .then(function(r){return r.json()})
      .then(function(d){
        if(d.daily&&d.daily.time&&d.daily.time.length>0){
          var days=d.daily.time.map(function(t,i){
            return{date:t,high:Math.round(d.daily.temperature_2m_max[i]),low:Math.round(d.daily.temperature_2m_min[i]),code:d.daily.weathercode[i]}

  };
  var codeToDesc=function(c){
    if(c<=1)return"Sunny";if(c<=3)return"Partly cloudy";if(c<=48)return"Cloudy/fog";
    if(c<=57)return"Drizzle";if(c<=67)return"Rain";if(c<=77)return"Snow";
    if(c<=82)return"Showers";return"Storms";

function ScottyFactsCarousel(){
  const[idx,sIdx]=useState(0);
  const len=SCOTTY_DATA.length;
  const prev=function(){sIdx((idx-1+len)%len)};
  const next=function(){sIdx((idx+1)%len)};
  const startX=useRef(0);const startT=useRef(0);
  const onTS=function(e){startX.current=e.touches[0].clientX;startT.current=Date.now()};
  const onTE=function(e){
    const dx=startX.current-e.changedTouches[0].clientX;
    const dt=Date.now()-startT.current;
    const vel=Math.abs(dx)/dt;
    if(Math.abs(dx)>50||vel>0.3){dx>0?next():prev()}
  };
  return h(React.Fragment,null,
    h("div",{className:"carousel",onTouchStart:onTS,onTouchEnd:onTE},
      h("div",{className:"carousel-track",style:{transform:"translateX(-"+idx*100+"%)"}},
        SCOTTY_DATA.map(function(s,i){
          return h("div",{className:"carousel-slide",key:i},
            h("div",{className:"card",style:{width:"100%",minHeight:"150px",display:"flex",flexDirection:"column",justifyContent:"center"}},
              h("div",{style:{fontSize:"clamp(.52rem,1.5vw,.58rem)",color:"var(--gold)",letterSpacing:"1.5px",textTransform:"uppercase",fontWeight:700,marginBottom:"8px"}},"Fact "+(i+1)+" / "+len),
              h("div",{style:{fontFamily:"var(--serif)",fontSize:"clamp(.9rem,2.7vw,1rem)",fontWeight:700,color:"#fff",marginBottom:"8px"}},s.q),
              h("div",{style:{fontSize:"clamp(.8rem,2.3vw,.86rem)",color:"var(--text-mid)",lineHeight:1.6,fontStyle:"italic"}},s.a),
            )
          )
        })
      )
    ),
    h("div",{className:"carousel-nav"},
      h("button",{className:"carousel-arrow",onClick:prev,"aria-label":"Previous"},"\u2039"),
      h("div",{className:"carousel-dots"},
        SCOTTY_DATA.map(function(_,i){return h("div",{key:i,className:"carousel-dot"+(i===idx?" active":""),onClick:function(){sIdx(i)}})})
      ),
      h("button",{className:"carousel-arrow",onClick:next,"aria-label":"Next"},"\u203A"),
    ),
  );
}

// ── Confessional Video option ──
function ConfessionalVideo(){
  var[recording,sRecording]=useState(false);
  var[supported]=useState(typeof navigator!=="undefined"&&!!navigator.mediaDevices);
  var startRec=function(){
    if(!supported){alert("Video recording needs camera access. Open this page in Safari or Chrome.");return}
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:true}).then(function(stream){
      sRecording(true);
      var chunks=[];
      var mr=new MediaRecorder(stream);
      mr.ondataavailable=function(e){chunks.push(e.data)};
      mr.onstop=function(){
        var blob=new Blob(chunks,{type:"video/mp4"});
        var url=URL.createObjectURL(blob);
        var a=document.createElement("a");a.href=url;a.download="confessional-"+Date.now()+".mp4";a.click();
        URL.revokeObjectURL(url);
        stream.getTracks().forEach(function(t){t.stop()});
        sRecording(false);
      };
      mr.start();
      // Auto-stop after 15 seconds
      setTimeout(function(){if(mr.state==="recording")mr.stop()},15000);
    }).catch(function(){alert("Camera access denied. Check your browser settings.")});
  };
  return h("div",{style:{marginTop:"12px"}},
    h("button",{
      className:"fab-next",
      onClick:startRec,
      style:recording?{background:"rgba(255,45,135,.3)",color:"var(--pink)"}:{}
    },recording?"\uD83D\uDD34 Recording... (15s max)":"\uD83C\uDFA5 Record a Video Confessional"),
    h("div",{style:{fontSize:"clamp(.58rem,1.6vw,.65rem)",color:"var(--text-dim)",marginTop:"6px"}},"Records 15 seconds. Saves to camera roll. Drop it in the shared album."),
  );
}

function MrMrsQuiz(){
  var[qi,sQi]=useState(0);
  var[picked,sPicked]=useState(-1);
  var[score,sScore]=useState(0);
  var[done,sDone]=useState(false);

  var q=QUIZ_QS[qi];
  var pick=function(idx){
    if(picked>=0)return;
    sPicked(idx);
    if(idx===q.answer)sScore(function(s){return s+1});
    setTimeout(function(){
      if(qi<QUIZ_QS.length-1){sQi(function(i){return i+1});sPicked(-1)}
      else{sDone(true);if(typeof window._confetti==="function")window._confetti()}
    },1500);
  };
  var reset=function(){sQi(0);sPicked(-1);sScore(0);sDone(false)};

  if(done){
    var pct=Math.round(score/QUIZ_QS.length*100);
    var msg=pct>=80?"Villa-certified soulmates.":pct>=50?"Not bad. The couple survives.":"Oof. Someone needs a recoupling.";
    return h("div",{className:"quiz-result"},
      h("div",{className:"quiz-score"},score+"/"+QUIZ_QS.length),
      h("div",{style:{fontSize:"clamp(.9rem,2.8vw,1rem)",color:"#fff",fontWeight:700,marginBottom:"4px"}},msg),
      h("div",{style:{marginBottom:"16px"}},"Compatibility level: "+pct+"%"),
      h("button",{className:"fab-next",onClick:reset},"Play again"),
    );
  }

  return h("div",null,
    h("div",{style:{fontSize:"clamp(.6rem,1.8vw,.68rem)",color:"var(--text-dim)",marginBottom:"12px"}},"Question "+(qi+1)+" of "+QUIZ_QS.length),
    h("div",{className:"quiz-q"},
      h("div",{className:"quiz-prompt"},q.q),
      h("div",{className:"quiz-opts"},
        q.opts.map(function(opt,idx){
          var cls="quiz-opt";
          if(picked>=0){
            if(idx===q.answer)cls+=" correct";
            else if(idx===picked)cls+=" wrong";
          }
          return h("div",{key:idx,className:cls,onClick:function(){pick(idx)}},opt);
        })
      ),
      picked>=0&&h("div",{style:{fontSize:"clamp(.72rem,2vw,.78rem)",color:"var(--text-dim)",fontStyle:"italic",marginTop:"10px"}},q.note),
    ),
  );
}

// ── Live "Now Playing" tracker (activates during trip) ──
function NowPlaying(){
  var now=new Date();
  var tripStart=new Date("2026-06-12T16:00:00");
  var tripEnd=new Date("2026-06-14T23:59:59");
  if(now<tripStart||now>tripEnd)return null;

  // Flatten all events with rough times
  var allEvents=[];
  SCHEDULE.forEach(function(day,di){
    day.events.forEach(function(ev,ei){
      var d=new Date("2026-06-"+(12+di));
      // Rough time mapping
      var hour=12;
      if(ev.time.match(/4 PM/))hour=16;
      else if(ev.time.match(/6 PM/))hour=18;
      else if(ev.time.match(/8 PM/))hour=20;
      else if(ev.time.match(/Late/i))hour=22;
      else if(ev.time.match(/Morning/i))hour=9;
      else if(ev.time.match(/Late AM/i))hour=10;
      else if(ev.time.match(/12:30/))hour=12.5;
      else if(ev.time.match(/3 PM/))hour=15;
      else if(ev.time.match(/7 PM/))hour=19;
      else if(ev.time.match(/10 PM/))hour=22;
      else if(ev.time.match(/Later/i))hour=11;
      d.setHours(Math.floor(hour),hour%1*60,0);
      allEvents.push({time:d,title:ev.title,desc:ev.desc,icon:ev.icon});
    });
  });

  // Find current/next
  var current=null,next=null;
  for(var i=0;i<allEvents.length;i++){
    if(allEvents[i].time<=now){current=allEvents[i]}
    if(allEvents[i].time>now&&!next){next=allEvents[i]}
  }

  if(!current&&!next)return null;
  return h("div",{className:"now-playing"},
    h("div",{className:"np-label"},h("div",{className:"np-dot"}),"Now in the villa"),
    current&&h("div",null,
      h("div",{className:"np-event"},current.icon+" "+current.title),
      h("div",{className:"np-desc"},current.desc),
    ),
    next&&h("div",{className:"np-next"},"Up next: "+next.icon+" "+next.title),
  );
}

<script>
// ═══ MUSIC AUTOPLAY WITH FALLBACK ═══
(function(){
  var audio = document.getElementById("villa-audio");
  if (!audio) return;
  audio.volume = 0.3;
  audio.loop = true;
  audio.preload = "auto";
  audio.setAttribute("playsinline","");

  // Use the local MP3 bundled next to the HTML
  audio.src = "yt1s_jBQzYkG.mp3";
  audio.load();

  // Expose a global starter so any component can kick off playback
  window._startVillaMusic = function(){
    var p = audio.play();
    if (p && typeof p.then === "function") {
      p.then(function(){
        document.body.classList.add("music-on");
      }).catch(function(){
        // Still blocked — leave listeners in place
      });
    }
  };

  function unlock(){
    window._startVillaMusic();
    if (!audio.paused) {
      ["touchstart","click","keydown","pointerdown"].forEach(function(e){
        document.removeEventListener(e, unlock, true);
      });
    }
  }

  // Try autoplay immediately (will almost certainly be blocked by browser policy)
  var attempt = audio.play();
  if (attempt && typeof attempt.then === "function") {
    attempt.then(function(){
      document.body.classList.add("music-on");
    }).catch(function(){
      // Wait for ANY real user gesture — capture phase so we catch it
      // before React's onClick swallows it.
      ["touchstart","click","keydown","pointerdown"].forEach(function(e){
        document.addEventListener(e, unlock, true);
      });
    });
  }

  // ── Mute/Unmute FAB ──
  var btn = document.createElement("button");
  btn.id = "mute-fab";
  btn.innerHTML = "🔊";
  btn.title = "Mute / Unmute";
  btn.style.cssText = "position:fixed;top:12px;right:16px;z-index:300;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.3)";
  btn.addEventListener("click", function(e) {
    e.stopPropagation();
    if (audio.paused) {
      audio.play().catch(function(){});
      btn.innerHTML = "🔊";
      btn.style.borderColor = "rgba(255,45,135,.3)";
      btn.style.background = "rgba(255,45,135,.15)";
    } else {
      audio.pause();
      btn.innerHTML = "🔇";
      btn.style.borderColor = "rgba(255,255,255,.15)";
      btn.style.background = "rgba(255,255,255,.1)";
    }
  });
  // Sync icon when audio starts playing
  audio.addEventListener("play", function() {
    btn.innerHTML = "🔊";
    btn.style.borderColor = "rgba(255,45,135,.3)";
    btn.style.background = "rgba(255,45,135,.15)";
  });
  document.body.appendChild(btn);
})();
</script>
